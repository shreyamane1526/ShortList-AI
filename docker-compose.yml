services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Ensure containers bind to all interfaces
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
      # Database URL is used by core/config.py and core/database.py
      DATABASE_URL: ${DATABASE_URL}
      # Qdrant URL (not yet fully integrated for matching, but used for future wiring)
      QDRANT_URL: ${QDRANT_URL}
      # Optional runtime controls
      RELOAD: ${RELOAD:-false}
    volumes:
      # Hot reload in dev: mount code, keep python deps in image
      - ./:/app
      # Persist models/registry on host for deterministic artifact reuse
      - ./models/registry:/app/models/registry
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - shortlist_net

  postgres:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - shortlist_net

  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - shortlist_net

  qdrant:
    image: qdrant/qdrant:v1.9.1
    volumes:
      - qdrant_data:/qdrant/storage
    expose:
      - "6333"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:6333/readyz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - shortlist_net

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
      DATABASE_URL: ${DATABASE_URL}
      QDRANT_URL: ${QDRANT_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
    command: ["sh", "-c", "celery -A core.celery_app worker --loglevel=INFO"]
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./:/app
      - ./models/registry:/app/models/registry
    networks:
      - shortlist_net

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
    command: ["sh", "-c", "celery -A core.celery_app beat --loglevel=INFO -S django"]
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./:/app
      - ./models/registry:/app/models/registry
    networks:
      - shortlist_net

volumes:
  postgres_data:
  qdrant_data:
  redis_data:


networks:
  shortlist_net:
    driver: bridge

